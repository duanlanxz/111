<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>待办事项</h1>

        <div class="input-bar">
            <input id="todoInput" type="text" placeholder="添加新的待办..." autofocus>
            <button onclick="addTodo()">添加</button>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all', this)">全部</button>
            <button onclick="setFilter('active', this)">未完成</button>
            <button onclick="setFilter('done', this)">已完成</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>
        <div class="status-bar" id="statusBar"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
